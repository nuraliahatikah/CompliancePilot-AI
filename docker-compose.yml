services:
  postgres:
    image: postgres:16-alpine
    container_name: cp-postgres
    environment:
      POSTGRES_USER: compliance
      POSTGRES_PASSWORD: compliance123
      POSTGRES_DB: compliancepilot
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U compliance -d compliancepilot"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cp-backend
    environment:
      DATABASE_URL: postgresql://compliance:compliance123@postgres:5432/compliancepilot
      SECRET_KEY: super-secret-change-in-production-abc123xyz
      CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      CHROMA_PERSIST_DIR: /app/data/chroma
      UPLOAD_DIR: /app/data/uploads
      REPORT_DIR: /app/data/reports
    volumes:
      - backend_data:/app/data
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    container_name: cp-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
  backend_data:
